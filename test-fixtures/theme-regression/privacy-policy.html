<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Privacy Policy - AECCS Cookie Compliance Checker</title>
  <style>
    :root {
      --bg: #fafafa;
      --surface: #ffffff;
      --text: #1a1a2e;
      --text-secondary: #555770;
      --accent: #6366f1;
      --accent-light: #eef2ff;
      --border: #e2e4e9;
      --green: #16a34a;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f1117;
        --surface: #1a1d27;
        --text: #e2e4e9;
        --text-secondary: #8b8fa3;
        --accent: #818cf8;
        --accent-light: rgba(99, 102, 241, 0.1);
        --border: #2a2e3a;
        --green: #22c55e;
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    header {
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
  </style>
</head>
<body>
  <header class="hero">
    <h1>Privacy Policy</h1>
    <p>AECCS Cookie Compliance Checker</p>
  </header>
</body>
</html>
